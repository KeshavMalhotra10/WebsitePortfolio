<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f7f6f2;
    color: #1a1a1a;
    font-family: 'Geist', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 80px 40px;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
  }

  .header { margin-bottom: 64px; }

  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #999;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Geist Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  .tagline {
    font-size: 14px;
    color: #888;
    line-height: 1.6;
  }

  .counter {
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 64px;
    padding: 16px 0;
    border-top: 1px solid #ddd;
    border-bottom: 1px solid #ddd;
    width: 100%;
  }

  .counter-num {
    font-family: 'Geist', sans-serif;
    font-size: 42px;
    font-weight: 400;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  .counter-label {
    font-size: 13px;
    color: #888;
    letter-spacing: 0.05em;
  }

  .section-label {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #bbb;
    margin-bottom: 20px;
  }

  .log { display: flex; flex-direction: column; }

  .log-entry {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 20px;
    padding: 14px 0;
    border-bottom: 1px solid #e8e6e0;
    align-items: baseline;
  }

  .log-entry:first-child { border-top: 1px solid #e8e6e0; }

  .log-date {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: #bbb;
    letter-spacing: 0.05em;
    padding-top: 1px;
  }

  .log-text {
    font-size: 14px;
    color: #1a1a1a;
    line-height: 1.5;
  }

  .tag {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #bbb;
    margin-left: 10px;
    vertical-align: middle;
  }

  .footer {
    margin-top: 64px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: #bbb;
    letter-spacing: 0.08em;
  }

  .footer a { color: #bbb; text-decoration: none; transition: color 0.15s; }
  .footer a:hover { color: #1a1a1a; }

  .dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    background: #1a1a1a;
    border-radius: 50%;
    margin-right: 7px;
    vertical-align: middle;
    animation: blink 2.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <p class="eyebrow">// personal journal</p>
    <h1>ML Progress</h1>
    <p class="tagline">Started February 26, 2026.</p>
  </div>

  <div class="counter">
    <span class="counter-num" id="days-count">0</span>
    <span class="counter-label">days in</span>
  </div>

  <div class="section-label">Log</div>

  <div class="log">

    <div class="log-entry">
      <span class="log-date">26·02·2026</span>
      <span class="log-text">Journey begins. <span class="tag">start</span></span>
    </div>

    <div class="log-entry">
      <span class="log-date">16·03·2026</span>
      <span class="log-text">JobFit RAG Project</span>
    </div>

    <!-- Add new entries here:
    <div class="log-entry">
      <span class="log-date">DD·MM·YYYY</span>
      <span class="log-text">Your entry here</span>
    </div>
    -->

  </div>

  <div class="footer">
    <a href="https://github.com/KeshavMalhotra10/ML" target="_blank">github →</a>
  </div>

</div>

<script>
  const start = new Date('2026-02-27');
  const today = new Date();
  const days = Math.floor((today - start) / (1000 * 60 * 60 * 24));
  document.getElementById('days-count').textContent = days;
</script>
</body>
</html>
