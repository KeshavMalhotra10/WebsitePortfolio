<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project — Keshav Malhotra</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='80' font-size='85' font-family='Georgia,serif' fill='%230f0f0e' text-anchor='middle'>K</text></svg>"><body>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
:root {
  --bg: #f4f1eb; --ink: #0f0f0e; --muted: #8c8984; --border: #ddd9d2;
  --surface: #eceae3; --accent: #0f0f0e; --accent-fg: #f4f1eb; --tag-bg: #e4e1da;
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'Instrument Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
  --nav-h: 64px; --max: 960px; --gap: 48px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-weight: 300; min-height: 100vh; overflow-x: hidden; }
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  height: var(--nav-h); display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--gap);
  background: rgba(244,241,235,0.94); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { font-family: var(--serif); font-size: 1.05rem; }
.nav-back {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--muted); transition: color 0.2s;
}
.nav-back:hover { color: var(--ink); }
.nav-back:hover svg { transform: translateX(-3px); }
.nav-back svg { transition: transform 0.2s; }

.hero { padding: 140px var(--gap) 72px; max-width: var(--max); margin: 0 auto; }
.hero-cat { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; opacity: 0; animation: up 0.6s 0.1s forwards; }
.hero-title { font-family: var(--serif); font-size: clamp(2.2rem, 5vw, 3.8rem); line-height: 1.05; letter-spacing: -0.025em; margin-bottom: 28px; opacity: 0; animation: up 0.6s 0.2s forwards; }
.hero-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 32px; opacity: 0; animation: up 0.6s 0.3s forwards; }
.tag { font-family: var(--mono); font-size: 10px; padding: 5px 11px; background: var(--tag-bg); border: 1px solid var(--border); border-radius: 3px; color: var(--muted); }
.hero-actions { display: flex; flex-wrap: wrap; gap: 10px; opacity: 0; animation: up 0.6s 0.4s forwards; }
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 11px 22px; font-size: 13px; font-weight: 400; border-radius: 5px; border: none; cursor: pointer; font-family: var(--sans); transition: all 0.2s; }
.btn-dark { background: var(--accent); color: var(--accent-fg); }
.btn-dark:hover { opacity: 0.82; transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--ink); transform: translateY(-1px); }

.divider { width: 100%; height: 1px; background: var(--border); max-width: var(--max); margin: 0 auto; }
.content { max-width: var(--max); margin: 0 auto; padding: 0 var(--gap) 120px; }

.media-wrap { padding: 64px 0 0; opacity: 0; animation: up 0.6s 0.5s forwards; }
.video-box { width: 100%; aspect-ratio: 16/9; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); background: var(--surface); }
.video-box iframe { width: 100%; height: 100%; border: none; display: block; }
.img-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-top: 20px; }
.img-grid img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 5px; border: 1px solid var(--border); transition: transform 0.3s; }
.img-grid img:hover { transform: scale(1.02); }

.about-section { padding: 56px 0; border-top: 1px solid var(--border); opacity: 0; animation: up 0.6s 0.6s forwards; }
.sec-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }
.about-text { font-size: 1.05rem; line-height: 1.85; color: var(--ink); max-width: 680px; }

.not-found { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; gap: 20px; }
.not-found h1 { font-family: var(--serif); font-size: 3rem; color: var(--muted); }

@keyframes up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 640px) { :root { --gap: 24px; } .hero { padding-top: 110px; } }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Keshav Malhotra</a>
  <a class="nav-back" href="index.html#portfolio">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    All Projects
  </a>
</nav>

<div id="app"></div>

<script>
var projects = [
  { id: "navbot", title: "NavBot: Hospital Navigation Robot", category: "mechanical", thumbnail: "assets/img/portfolio/thumbnailForNavBot.png", description: "Alongside a team of collaborators, I led the ideation and contributed to the development of NavBot, an autonomous hospital navigation robot built on the VEX IQ platform using C++. The project aimed to reduce repetitive workload for hospital staff, enable secure medication delivery, demonstrate practical autonomy with minimal hardware, and apply graph-based algorithms to real-world robotics problems. I played a key role in shaping the system’s overall design and direction, while contributing to the integration of sensor-based safety features such as obstacle detection and collision handling to ensure reliable operation in dynamic environments. NavBot operates as a fully self-contained system with a controller-based interface, showcasing the application of algorithms and embedded systems to improve efficiency in healthcare settings.", tech: ["C++", "VEX IQ", "Solidworks"], github: "https://github.com/KeshavMalhotra10/navBot", demo: null, medium: null, video: "https://www.youtube.com/watch?v=rkE9pB7YZUg", images: [] },
  { id: "roboventure", title: "Roboventure Robotics Workshop", category: "video", thumbnail: "assets/img/portfolio/roboventure.jpeg", description: "I led RoboVenture, a community-driven robotics initiative designed to make STEM education accessible to underprivileged students, funded by Promise1000 Canada. Working alongside members of my robotics team, I developed and delivered hands-on workshops introducing participants to Arduino programming, basic circuitry, and mechanical tool usage. The program emphasized experiential learning, allowing students to build and experiment with real hardware while gaining confidence in technical skills. Through this initiative, I helped cultivate strong interest in robotics within the community, growing our team from 12 to over 50 members and establishing a sustainable pipeline of new, engaged students.", tech: ["Arduino", "Breadboarding", "C++"], github: null, demo: null, medium: null, video: "https://www.youtube.com/watch?v=sBWyKxTF7IU", images: [] },
  { id: "jobfit", title: "JobFit — AI Resume Analyzer", category: "programming", thumbnail: "assets/img/portfolio/jobfitSS.png", description: "JobFit — AI Resume Analyzer. When applying to internships, I kept wondering if my resume would actually pass ATS filters, so I built a tool to find out. Paste a job posting and JobFit scores your resume against it, returning an ATS match score, missing keywords, strong experience matches, and the exact resume sections that drove the analysis. Under the hood it uses a RAG pipeline: your resume gets chunked, embedded, and retrieved via cosine similarity before being injected into a structured GPT prompt, so every result is traceable, not a black box.", tech: ["Python", "Flask", "OpenAI", "NumPy", "RAG", "Render"], github: "https://github.com/KeshavMalhotra10/JobFit_Resume_Analyzer", demo: "https://jobfit-3tgb.onrender.com/", medium: null, video: "https://youtu.be/wVwTmoXA0uU", images: [] },
  { id: "heart-disease", title: "Using AI to predict Heart Disease", category: "programming", thumbnail: "assets/img/portfolio/gradientDescent.webp", description: "Developed a logistic regression model to predict heart disease risk using clinical data. Features are combined through a weighted dot product and passed through a sigmoid activation to produce probabilistic outputs. The model is optimized using gradient descent on a cost function, with experiments in learning rate and parameter initialization achieving ~90% accuracy.", tech: ["Machine Learning", "PyTorch", "NumPy", "Matplotlib", "Jupyter Notebook"], github:null, kaggle: "https://www.kaggle.com/code/keshavmalhotra10/keshav-heart-disease-algorithm?source=post_page-----5363555a0152---------------------------------------", medium:"https://medium.com/@malhotrakeshav10/using-a-i-to-predict-heart-disease-5363555a0152" , video:null , images: ["assets/img/portfolio/gradientDescent.webp"] },

];

var CAT_LABEL = { mechanical: "Mechanical", programming: "Programming", hardware: "hardware" };

function ytId(url) {
  if (!url) return null;
  var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([^?&]+)/);
  return m ? m[1] : null;
}

function render() {
  var id = new URLSearchParams(window.location.search).get("id");
  var p = null;
  for (var i = 0; i < projects.length; i++) { if (projects[i].id === id) { p = projects[i]; break; } }
  var app = document.getElementById("app");

  if (!p) {
    app.innerHTML = '<div class="not-found"><h1>Project not found</h1><a class="btn btn-dark" href="index.html#portfolio">Back to work</a></div>';
    return;
  }

  document.title = p.title + " — Keshav Malhotra";

  var vid = ytId(p.video);
  var tags = p.tech.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join("");
  var btns = [];
  if (p.demo)   btns.push('<a class="btn btn-dark"  href="' + p.demo   + '" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1h6v6M13 1L6 8M1 13V8a1 1 0 011-1h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>Live Demo</a>');
  if (p.kaggle) btns.push('<a class="btn btn-ghost" href="' + p.kaggle + '" target="_blank" rel="noopener">' +
  '<svg width="13" height="13" viewBox="0 0 32 32" fill="currentColor"><path d="M18.825 23.6l-6.05-6.875L18.9 9.975h-3.4l-5.7 6.525V4h-2.85v24h2.85v-7.05l1.325-1.4 5.875 8.45h3.475l-1.65-4.4z"/></svg>' +
  'View on Kaggle</a>');
  if (p.github) btns.push('<a class="btn btn-ghost" href="' + p.github + '" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>View on GitHub</a>');
  if (p.medium) btns.push('<a class="btn btn-ghost" href="' + p.medium + '" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M9.025 8c0 2.485-1.984 4.5-4.432 4.5C2.148 12.5.125 10.485.125 8S2.148 3.5 4.593 3.5c2.448 0 4.432 2.015 4.432 4.5zm4.86 0c0 2.34-1.001 4.237-2.236 4.237-1.234 0-2.235-1.897-2.235-4.237s1-4.237 2.235-4.237C12.884 3.763 13.885 5.66 13.885 8zm2.09 0c0 2.096-.35 3.795-.783 3.795-.432 0-.782-1.699-.782-3.795s.35-3.795.783-3.795c.432 0 .782 1.699.782 3.795z"/></svg>Read on Medium</a>');

  var media = "";
  if (vid || p.images.length) {
    media = '<div class="media-wrap">';
    if (vid) media += '<div class="video-box"><iframe src="https://www.youtube.com/embed/' + vid + '" allowfullscreen loading="lazy"></iframe></div>';
    if (p.images.length) media += '<div class="img-grid">' + p.images.map(function(s) { return '<img src="' + s + '" alt="' + p.title + '" loading="lazy"/>'; }).join("") + '</div>';
    media += '</div>';
  }

  app.innerHTML =
    '<div class="hero">' +
      '<p class="hero-cat">' + (CAT_LABEL[p.category] || p.category) + '</p>' +
      '<h1 class="hero-title">' + p.title + '</h1>' +
      (tags ? '<div class="hero-tags">' + tags + '</div>' : '') +
      (btns.length ? '<div class="hero-actions">' + btns.join("") + '</div>' : '') +
    '</div>' +
    '<div class="divider"></div>' +
    '<div class="content">' +
      media +
      '<div class="about-section">' +
        '<p class="sec-label">About this project</p>' +
        '<p class="about-text">' + p.description + '</p>' +
      '</div>' +
    '</div>';
}

render();
</script>
</body>
</html>
